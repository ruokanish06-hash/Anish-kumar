<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🤣 Joke Generator</h1>
            <p class="subtitle">Get a random joke to brighten your day!</p>
            
            <div class="joke-display" id="jokeDisplay">
                <p id="jokeText">Click the button to get a joke...</p>
            </div>
            
            <div class="controls">
                <button id="getJokeBtn" class="btn btn-primary">Get Joke</button>
                <button id="copyBtn" class="btn btn-secondary">Copy</button>
                <select id="categorySelect" class="select">
                    <option value="any">Any Category</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock-Knock</option>
                </select>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>
            
            <div id="error" class="error"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
